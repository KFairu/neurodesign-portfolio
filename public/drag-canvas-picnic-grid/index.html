<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Picnic Grid Canvas Prototype</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="workspace" id="workspace" aria-label="Picnic grid generation canvas">
      <svg class="connections" id="connections" aria-hidden="true"></svg>

      <section class="node image-node" data-node-id="image-reference" style="--x: 80px; --y: 155px">
        <header class="node-header">
          <span>image.png</span>
          <button class="icon-button" type="button" aria-label="More options">...</button>
        </header>
        <div class="photo-frame photo-reference"></div>
        <footer class="node-footer">
          <span class="plus">+</span>
          <span>Add more images</span>
        </footer>
        <span class="port port-out" data-port="image-reference-out"></span>
      </section>

      <section class="node prompt-node" data-node-id="prompt-picnic" style="--x: 450px; --y: 155px">
        <header class="node-header">
          <span>Prompt</span>
          <button class="icon-button copy-button" type="button" aria-label="Copy prompt" title="Copy prompt">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 8.5h8.5v10H8z" />
              <path d="M5.5 15.5V5.5h8.5" />
            </svg>
          </button>
        </header>
        <div class="prompt-box" id="prompt-text">
          <p>Loading prompt...</p>
        </div>
        <footer class="node-footer">
          <span class="plus">+</span>
          <span>Add variable</span>
        </footer>
        <span class="port port-out prompt-port" data-port="prompt-picnic-out"></span>
      </section>

      <section class="node image-node model-node" data-node-id="model-gemini" style="--x: 820px; --y: 155px">
        <header class="node-header model-header">
          <span class="spark"></span>
          <span>Gemini 3 (Nano Banana Pro)</span>
          <button class="icon-button" type="button" aria-label="More options">...</button>
        </header>
        <div class="photo-frame photo-gemini"></div>
        <footer class="node-footer split-footer">
          <span><span class="plus">+</span> Add another image input</span>
          <button class="run-button" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 12h13" />
              <path d="m13 6 6 6-6 6" />
            </svg>
            <span>Run Model</span>
          </button>
        </footer>
        <span class="port port-in prompt-in" data-port="gemini-prompt-in"></span>
        <span class="port port-in port-stack-2" data-port="gemini-image-a-in"></span>
        <span class="port port-out" data-port="gemini-out"></span>
      </section>

      <section class="node image-node model-node chatgpt-node" data-node-id="model-chatgpt" style="--x: 1190px; --y: 155px">
        <header class="node-header model-header chatgpt-header">
          <img class="model-icon" src="./assets/chatgpt-icon.png" alt="" aria-hidden="true" />
          <span>ChatGPT Imagen 2.0</span>
          <button class="icon-button" type="button" aria-label="More options">...</button>
        </header>
        <div class="photo-frame photo-chatgpt"></div>
        <footer class="node-footer split-footer">
          <span><span class="plus">+</span> Add another image input</span>
          <button class="run-button" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M5 12h13" />
              <path d="m13 6 6 6-6 6" />
            </svg>
            <span>Run Model</span>
          </button>
        </footer>
        <span class="port port-in prompt-in" data-port="chatgpt-prompt-in"></span>
        <span class="port port-in port-stack-2" data-port="chatgpt-image-a-in"></span>
        <span class="port port-out" data-port="chatgpt-out"></span>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
